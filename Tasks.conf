MOUNTING_POINT="$HOME/Desktop/smb"
# FORMAT:
# NAME|PARENT_DIR|TARGET_DIR|SOURCE_DIR
    # NAME: the Backup task name (up to you)
    # PARENT_DIR: where is the backup (including TARGET_DIR and changed Folder)
    # TARGET_DIR: the name of the folder where your backup files should go e.g Content under the PARENT_DIR
    # SOURCE_DIR: the folder of your backup source
"ShellBackup"|"$HOME/Desktop/smb/备份/ShellBackup"|"Content"|"$HOME/scripts/"
# Projects|/home/user/Projs|/mnt/backup/projs